<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kartu Ucapan</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    .card {
      position: relative;
      width: 320px;
      height: 200px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(255,255,255,0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      animation: float 6s ease-in-out infinite;
    }

    /* Border animasi glowing */
    .card::before {
      content: "";
      position: absolute;
      width: 400%;
      height: 400%;
      background: conic-gradient(
        from 0deg,
        #ff9a9e,
        #fad0c4,
        #fad0c4,
        #ffdde1,
        #ff9a9e
      );
      animation: rotate 8s linear infinite;
      top: -150%;
      left: -150%;
      z-index: 1;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 4px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 16px;
      z-index: 2;
    }

    .message {
      position: relative;
      z-index: 3;
      color: #fff;
      font-size: 1.5rem;
      white-space: nowrap;
      border-right: 3px solid rgba(255,255,255,0.75);
      width: 0;
      overflow: hidden;
      animation: typing 3s steps(20, end) forwards, blink 0.8s step-end infinite;
    }

    /* Animasi */
    @keyframes typing {
      from { width: 0; }
      to { width: 16ch; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="message">johari bais buit ......</div>
  </div>
</body>
</html>
